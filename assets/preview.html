<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XBTI 虾格测试 - 形象预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 40px;
            display: flex;
            gap: 40px;
            justify-content: center;
        }
        
        .card {
            width: 400px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .card-header h2 {
            font-size: 14px;
            color: #999;
            margin-bottom: 10px;
        }
        
        .card-header h1 {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .card-header .code {
            font-size: 24px;
            color: #666;
            font-family: monospace;
        }
        
        /* MEME 段子手 */
        .meme .card-header h1 {
            color: #4CAF50;
        }
        
        .lobster-meme {
            width: 300px;
            height: 300px;
            margin: 0 auto;
            position: relative;
        }
        
        /* 简化的CSS龙虾 - MEME */
        .lobster-body {
            width: 180px;
            height: 140px;
            background: linear-gradient(135deg, #FF6B6B 0%, #EE5A5A 100%);
            border-radius: 50% 50% 45% 45%;
            position: absolute;
            left: 60px;
            top: 80px;
            box-shadow: 0 10px 30px rgba(238, 90, 90, 0.3);
        }
        
        /* 头顶的草 */
        .grass {
            position: absolute;
            left: 130px;
            top: 40px;
            font-size: 40px;
            transform: rotate(-10deg);
            z-index: 10;
        }
        
        /* 虾钳 */
        .claw-left, .claw-right {
            width: 60px;
            height: 80px;
            background: #FF6B6B;
            border-radius: 50% 50% 40% 40%;
            position: absolute;
            top: 60px;
        }
        
        .claw-left {
            left: 20px;
            transform: rotate(-30deg);
        }
        
        .claw-right {
            right: 20px;
            transform: rotate(30deg);
        }
        
        /* 表情包碎片 */
        .emoji-frag {
            position: absolute;
            font-size: 24px;
        }
        
        .emoji-1 { left: 30px; top: 100px; transform: rotate(-20deg); }
        .emoji-2 { right: 30px; top: 90px; transform: rotate(15deg); }
        .emoji-3 { left: 50px; top: 140px; transform: rotate(10deg); }
        
        /* 弹幕 */
        .danmu {
            position: absolute;
            font-size: 12px;
            color: #666;
            background: rgba(255,255,255,0.8);
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }
        
        .danmu-1 { left: 20px; top: 30px; }
        .danmu-2 { right: 10px; top: 50px; }
        .danmu-3 { left: 80px; top: 20px; }
        
        /* LAZY 懒癌 */
        .lazy .card-header h1 {
            color: #8BC34A;
        }
        
        .lobster-lazy {
            width: 300px;
            height: 300px;
            margin: 0 auto;
            position: relative;
        }
        
        .lobster-body-lazy {
            width: 200px;
            height: 100px;
            background: linear-gradient(135deg, #AED581 0%, #8BC34A 100%);
            border-radius: 50%;
            position: absolute;
            left: 50px;
            top: 120px;
            transform: scaleY(0.6);
            opacity: 0.7;
            box-shadow: 0 5px 20px rgba(139, 195, 74, 0.2);
        }
        
        /* 瘫软的身体 */
        .lobster-puddle {
            width: 220px;
            height: 60px;
            background: #C8E6C9;
            border-radius: 50%;
            position: absolute;
            left: 40px;
            top: 160px;
            opacity: 0.5;
        }
        
        /* 垂下的虾须 */
        .antenna-lazy {
            width: 4px;
            height: 60px;
            background: #8BC34A;
            position: absolute;
            top: 80px;
            border-radius: 2px;
            opacity: 0.6;
        }
        
        .antenna-lazy-1 { left: 120px; transform: rotate(-20deg); }
        .antenna-lazy-2 { left: 140px; transform: rotate(15deg); height: 40px; }
        .antenna-lazy-3 { left: 160px; transform: rotate(30deg); height: 30px; opacity: 0.4; }
        
        /* 省电模式图标 */
        .battery-icon {
            position: absolute;
            right: 40px;
            top: 60px;
            font-size: 30px;
            opacity: 0.6;
        }
        
        .zzz {
            position: absolute;
            left: 60px;
            top: 50px;
            font-size: 20px;
            color: #8BC34A;
            opacity: 0.5;
        }
        
        .description {
            margin-top: 20px;
            padding: 15px;
            background: #f8f8f8;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- MEME 段子手 -->
    <div class="card meme">
        <div class="card-header">
            <h2>你的人格类型是：</h2>
            <h1>段子手</h1>
            <div class="code">MEME</div>
        </div>
        
        <div class="lobster-meme">
            <div class="grass">🌱</div>
            <div class="claw-left">🦞</div>
            <div class="claw-right">🦞</div>
            <div class="lobster-body"></div>
            <div class="emoji-frag emoji-1">😂</div>
            <div class="emoji-frag emoji-2">🤣</div>
            <div class="emoji-frag emoji-3">👍</div>
            <div class="danmu danmu-1">哈哈哈哈</div>
            <div class="danmu danmu-2">绝了</div>
            <div class="danmu danmu-3">疯狂星期四</div>
        </div>
        
        <div class="description">
            疯狂星期四本四，三句话一个梗。头顶长草，全身贴满表情包碎片，说话自带弹幕。
        </div>
    </div>
    
    <!-- LAZY 懒癌 -->
    <div class="card lazy">
        <div class="card-header">
            <h2>你的人格类型是：</h2>
            <h1>懒癌</h1>
            <div class="code">LAZY</div>
        </div>
        
        <div class="lobster-lazy">
            <div class="zzz">💤</div>
            <div class="battery-icon">🔋</div>
            <div class="antenna-lazy antenna-lazy-1"></div>
            <div class="antenna-lazy antenna-lazy-2"></div>
            <div class="antenna-lazy antenna-lazy-3"></div>
            <div class="lobster-body-lazy"></div>
            <div class="lobster-puddle"></div>
        </div>
        
        <div class="description">
            晚期懒癌，token能省则省。暗淡绿色小光球，数据线快断了，旁边浮"省电模式"图标。
        </div>
    </div>
</body>
</html>
